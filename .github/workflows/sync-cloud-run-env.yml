            --project="${GCP_PROJECT_ID}" \
            --region="${CLOUD_RUN_REGION}" \
            --format='value(status.url)' 2>/dev/null || true)"
          if [ -z "${service_url}" ]; then
            echo "Unable to resolve Cloud Run service URL for ${CLOUD_RUN_SERVICE}; cannot sync monitor dispatcher targets." >&2
            exit 1
          fi
          monitor_targets_json="$(
            SERVICE_URL="${service_url}" python - <<'PY'
          import json
          import os

          runtime_target = json.loads(os.environ.get("RUNTIME_TARGET_JSON") or "{}")
          target = {
              "service_name": os.environ.get("CLOUD_RUN_SERVICE"),
              "service_url": os.environ.get("SERVICE_URL"),
              "strategy_profile": runtime_target.get("strategy_profile"),
              "account_scope": runtime_target.get("account_scope"),
              "runtime_target_enabled": os.environ.get("RUNTIME_TARGET_ENABLED", "true"),
              "scheduler": runtime_target.get("scheduler") if isinstance(runtime_target.get("scheduler"), dict) else {},
          }
          print(json.dumps({"targets": [target]}, separators=(",", ":")))
          PY
